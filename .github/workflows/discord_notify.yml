name: Discord Notification

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send NovaCo Push Notification
        run: |
          # The color 3327231 is a deep 'Nova' Sapphire taken from your logo
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
            "content": "<@&1490287716192223332>",
            "embeds": [
              {
                "title": "💎 NovaCo // System Update",
                "description": "Deployment triggered by **${{ github.actor }}**",
                "color": 3327231,
                "thumbnail": {
                  "url": "https://avatars.githubusercontent.com/u/272980283?s=200&v=4"
                },
                "fields": [
                  {
                    "name": "📂 Repository",
                    "value": "`${{ github.repository }}`",
                    "inline": true
                  },
                  {
                    "name": "🆔 Build",
                    "value": "`v1.0.${{ github.run_number }}`",
                    "inline": true
                  },
                  {
                    "name": "📝 Change Log",
                    "value": "```fix\n${{ github.event.head_commit.message }}\n```",
                    "inline": false
                  }
                ],
                "footer": {
                  "text": "STYX Team • NovaCo Central",
                  "icon_url": "https://github.com/${{ github.actor }}.png"
                },
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
              }
            ],
            "components": [
              {
                "type": 1,
                "components": [
                  {
                    "type": 2,
                    "style": 5,
                    "label": "Review Changes",
                    "url": "${{ github.event.head_commit.url }}",
                    "emoji": { "name": "✨" }
                  },
                  {
                    "type": 2,
                    "style": 5,
                    "label": "Source",
                    "url": "https://github.com/${{ github.repository }}",
                    "emoji": { "name": "🐙" }
                  }
                ]
              }
            ]
          }' "${{ secrets.DISCORD_WEBHOOK_URL }}"