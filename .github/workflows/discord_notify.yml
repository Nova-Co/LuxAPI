name: Discord Notification

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # Step 1: We must check out the code to read build.gradle.kts
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Send NovaCo Push Notification
        run: |
          # 1. Extract version from build.gradle.kts (looks for the first 'version = "..."')
          RAW_VERSION=$(grep -m 1 "version =" build.gradle.kts | cut -d '"' -f 2)
          
          # 2. Setup variables with fallbacks
          MSG="${{ github.event.head_commit.message }}"
          URL="${{ github.event.head_commit.url }}"
          REPO="${{ github.repository }}"
          RUN="${{ github.run_number }}"
          
          if [ -z "$MSG" ]; then MSG="Manual system verification / No commit data"; fi
          if [ -z "$URL" ]; then URL="https://github.com/$REPO"; fi
          if [ -z "$RAW_VERSION" ]; then RAW_VERSION="Unknown"; fi

          # 3. Create the JSON payload file
          cat <<EOF > payload.json
          {
            "content": "<@&1490287716192223332>",
            "embeds": [
              {
                "title": "💎 NovaCo // Deployment Update",
                "color": 3327231,
                "thumbnail": {
                  "url": "https://avatars.githubusercontent.com/u/272980283?s=200&v=4"
                },
                "fields": [
                  {
                    "name": "🏷️ Version",
                    "value": "\`v$RAW_VERSION (Build #$RUN)\`",
                    "inline": true
                  },
                  {
                    "name": "📂 Repository",
                    "value": "[\`$REPO\`](https://github.com/$REPO)",
                    "inline": true
                  },
                  {
                    "name": "📝 Change Log",
                    "value": "\`\`\`fix\n$MSG\n\`\`\`",
                    "inline": false
                  }
                ],
                "footer": {
                  "text": "STYX Team • NovaCo Infrastructure",
                  "icon_url": "https://github.com/${{ github.actor }}.png"
                },
                "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              }
            ],
            "components": [
              {
                "type": 1,
                "components": [
                  {
                    "type": 2,
                    "style": 5,
                    "label": "Review Code",
                    "url": "$URL",
                    "emoji": { "name": "✨" }
                  }
                ]
              }
            ]
          }
          EOF

          # 4. Execute the Post
          curl -i -H "Content-Type: application/json" \
               -X POST \
               -d @payload.json \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"