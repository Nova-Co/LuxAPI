name: Discord Notification

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send NovaCo Push Notification
        run: |
          # 1. Prepare dynamic data
          MSG="${{ github.event.head_commit.message }}"
          if [ -z "$MSG" ]; then MSG="Manual system test triggered."; fi
          
          # 2. Construct JSON safely to a file
          cat <<EOF > payload.json
          {
            "content": "<@&1490287716192223332>",
            "embeds": [{
              "title": "💎 NovaCo Update // v1.0.${{ github.run_number }}",
              "description": "$MSG",
              "url": "${{ github.event.head_commit.url || 'https://github.com/' }}${{ github.repository }}",
              "color": 3327231,
              "footer": {
                "text": "STYX Team • ${{ github.repository }}"
              },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF

          # 3. Send the file
          curl -i -H "Content-Type: application/json" \
               -X POST \
               -d @payload.json \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"