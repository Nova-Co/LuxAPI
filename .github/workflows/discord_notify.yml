name: Discord Notification

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures we can see the history if needed

      - name: Send NovaCo Push Notification
        run: |
          # 1. Get Version from Gradle
          RAW_VERSION=$(grep -m 1 "version =" build.gradle.kts | cut -d '"' -f 2)
          if [ -z "$RAW_VERSION" ]; then RAW_VERSION="Unknown"; fi

          # 2. Extract and format the Change Log
          # We use jq to parse the GitHub Event JSON for all commit messages
          if [ "${{ github.event_name }}" == "push" ]; then
            CHANGELOG=$(echo '${{ toJson(github.event.commits) }}' | jq -r '.[] | "• \(.message | split("\n")[0]) ([\(.id[0:7])])"' | sed ':a;N;$!ba;s/\n/\\n/g')
          else
            CHANGELOG="Manual system verification test."
          fi

          # 3. Define basic variables
          REPO="${{ github.repository }}"
          COMPARE_URL="${{ github.event.compare || 'https://github.com/${{ github.repository }}' }}"

          # 4. Construct the JSON Payload
          cat <<EOF > payload.json
          {
            "content": "<@&1490287716192223332>",
            "embeds": [
              {
                "title": "💎 NovaCo // System Update",
                "color": 3327231,
                "thumbnail": {
                  "url": "https://avatars.githubusercontent.com/u/272980283?s=200&v=4"
                },
                "fields": [
                  {
                    "name": "🏷️ Version",
                    "value": "\`v$RAW_VERSION\`",
                    "inline": true
                  },
                  {
                    "name": "📂 Repository",
                    "value": "[\`$REPO\`](https://github.com/$REPO)",
                    "inline": true
                  },
                  {
                    "name": "📝 Change Log",
                    "value": "\`\`\`fix\n$CHANGELOG\n\`\`\`",
                    "inline": false
                  }
                ],
                "footer": {
                  "text": "",
                  "icon_url": "https://github.com/${{ github.actor }}.png"
                },
                "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              }
            ],
            "components": [
              {
                "type": 1,
                "components": [
                  {
                    "type": 2,
                    "style": 5,
                    "label": "Review All Changes",
                    "url": "$COMPARE_URL",
                    "emoji": { "name": "✨" }
                  }
                ]
              }
            ]
          }
          EOF

          # 5. Send it
          curl -i -H "Content-Type: application/json" \
               -X POST \
               -d @payload.json \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"